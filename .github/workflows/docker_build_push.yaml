name: Python Docker Build and Push
on:
  push:
    branches:
      - main
    schedule:
    - cron: "0 0 * * 6"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GHCR and push image
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Extract short commit hash
        run: echo "COMMIT_HASH=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV

      - name: Push Docker image
        run: docker buildx build --file ./src/Dockerfile --platform linux/amd64 --push --tag ghcr.io/echoblag/octo2influx:${{ env.COMMIT_HASH }} --tag ghcr.io/echoblag/octo2influx:latest ./src



